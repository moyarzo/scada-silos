<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- 🔥 CLAVE PARA RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sistema Monitoreo Planta Los Bronces - Silos de Matriz</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">

    <header class="header">
      <h1>Sistema Monitoreo Planta Los Bronces</h1>
      <div class="status-bar">
        <span id="modo">Modo: REAL</span>
        <span id="mqtt-status">Última actualización MQTT: --:--:--</span>
      </div>
    </header>

    <!-- SILOS -->
    <section class="silos-grid" id="silosContainer"></section>

    <!-- RESUMEN -->
    <section class="resumen-grid" id="resumenContainer"></section>

    <!-- GRÁFICOS -->
    <section class="charts-container" id="chartsContainer"></section>

    <!-- BOTONES -->
    <section class="acciones">
      <button onclick="descargarDatos()">Descargar datos</button>
      <button onclick="descargarTendencia()">Descargar tendencia</button>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
