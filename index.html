<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SISTEMA MONITOREO - LOS BRONCES - SILOS DE MATRIZ</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="header">
    <img src="logo.png" class="logo" alt="Logo">
    <h1>SISTEMA MONITOREO - LOS BRONCES - SILOS DE MATRIZ</h1>
  </div>

  <div class="top-panel" id="topPanel"></div>

  <div class="mode-bar">
    <div class="mode-selector">
      <label>
        <input type="radio" name="mode" value="demo">
        Modo DEMO
      </label>

      <label>
        <input type="radio" name="mode" value="real" checked>
        Modo REAL
      </label>
    </div>

    <div class="mqtt-status" id="mqttStatus">🔴 Sin señal (--:--:--)</div>

    <div class="chart-date-bar">
      <label for="chartDateSelect">Día gráficos:</label>
      <select id="chartDateSelect"></select>
    </div>

    <button id="exportBtn" class="export-btn">Descargar Excel diario</button>
    <button id="exportTrendBtn" class="export-btn">Descargar historial 30 días</button>
  </div>

  <div class="grid" id="grid"></div>

  <footer class="footer">
    &#169; 2026 Engineered and developed by MOH (marco.oyarzo@enaex.com) | All rights reserved
  </footer>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
